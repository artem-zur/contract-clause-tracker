<div class="flex flex-col items-center justify-center p-8 border border-dashed border-slate-300 rounded-xl bg-slate-50/50 hover:bg-slate-50 transition-colors duration-200">
  
  <input 
    type="file" 
    #fileInput 
    accept=".txt" 
    class="hidden" 
    (change)="onFileSelected($event)" 
  />

  <button 
    mat-flat-button 
    color="primary"
    [disabled]="isUploading()"
    (click)="triggerFileInput()"
  >
    @if (isUploading()) {
      <span class="flex items-center gap-2">
        <mat-spinner diameter="18" color="accent"></mat-spinner>
        <span>Processing file...</span>
      </span>
    } @else {
      <span class="flex items-center gap-2">
        <mat-icon>upload_file</mat-icon>
        <span>Upload Contract</span>
      </span>
    }
  </button>
  
  <p class="mt-3 text-xs text-slate-400 font-normal">
    Supported format: Plain text files (<code class="bg-slate-100 px-1 py-0.5 rounded text-slate-600 font-mono">.txt</code>) only.
  </p>
</div>
