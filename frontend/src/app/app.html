<header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <div class="flex items-center gap-4">
      @if (!isHomePage()) {
        <button mat-icon-button routerLink="/" class="!inline-flex">
          <mat-icon>arrow_back</mat-icon>
        </button>
      }

      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-teal-600 flex items-center justify-center text-white font-bold text-lg shadow-sm">C</div>
        <span class="text-xl font-semibold tracking-tight text-[#0f172a]">Contract Clause Tracker</span>
      </div>
    </div>
  </div>
</header>

<div class="min-h-screen bg-[#f8fafc] text-[#0f172a] font-sans antialiased">
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <router-outlet></router-outlet>
  </main>
</div>
